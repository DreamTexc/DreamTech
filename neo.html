<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DreamTech</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: monospace;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #loader, #main-content {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    #main-content {
      opacity: 0;
      transition: opacity 1s ease;
    }

    .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(20px);
    }
  </style>
</head>

<body>

  <!-- ⭐ LOADER SCREEN (silver dollar ritual text) -->
  <div id="loader">
    <main id="loader-text">
this way i can become a better manipulator and eventually sell #DreamTech hardware to you “the sleeper cell bot”.
goodnight
    </main>
  </div>

  <!-- ⭐ MAIN CONTENT (your updated page) -->
  <div id="main-content">
    <h1 id="animated-text">Motion Character Tracer</h1>
  </div>

  <!-- Motion One -->
  <script src="https://cdn.jsdelivr.net/npm/motion@10.16.4/dist/motion.min.js"></script>

  <script>
    const { animate, stagger } = motion;

    // Animate loader text
    const loaderText = document.getElementById("loader-text");
    const loaderString = loaderText.textContent;
    loaderText.textContent = "";

    loaderString.split("").forEach(char => {
      const span = document.createElement("span");
      span.textContent = char;
      span.classList.add("char");
      loaderText.appendChild(span);
    });

    animate(".char", { opacity: [0,1], y: [20,0] }, { duration: 0.4, delay: stagger(0.05) });

    // After 5 seconds, fade out loader and fade in main content
    setTimeout(() => {
      document.getElementById("loader").style.opacity = 0;

      setTimeout(() => {
        document.getElementById("loader").remove();
        document.getElementById("main-content").style.opacity = 1;

        // Animate main content text
        const mainText = document.getElementById("animated-text");
        const mainString = mainText.textContent;
        mainText.textContent = "";

        mainString.split("").forEach(char => {
          const span = document.createElement("span");
          span.textContent = char;
          span.classList.add("char");
          mainText.appendChild(span);
        });

        animate(".char", { opacity: [0,1], y: [20,0] }, { duration: 0.4, delay: stagger(0.05) });

      }, 1000);
    }, 5000);
  </script>

</body>
</html>
