<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DreamTech</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: monospace;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* LOADER stays fullscreen */
    #loader {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      opacity: 1;               /* REQUIRED so fade-out works */
      transition: opacity 1s ease;
    }

    /* MAIN CONTENT is normal page content */
    #main-content {
      opacity: 0;               /* starts hidden */
      transition: opacity 1s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(20px);
    }

    .char-main {
      display: inline-block;
      opacity: 0;
      transform: translateY(20px);
    }
  </style>
</head>

<body>

  <!-- ⭐ LOADER SCREEN -->
  <div id="loader">
    <main id="loader-text">
this way i can become a better manipulator and eventually sell #DreamTech hardware to you “the sleeper cell bot”.
goodnight
    </main>
  </div>

  <!-- ⭐ MAIN CONTENT -->
  <div id="main-content">
    <h1 id="animated-text">Motion Character Tracer</h1>
  </div>

  <!-- Motion One -->
  <script src="https://as1.ftcdn.net/v2/jpg/05/71/55/96/1000_F_571559697_IKxtD73oKlGMsD4PA0SUAPRlwFSCmLbu.jpg"></script>

  <script>
    const { animate, stagger } = motion;

    /* ------------------------------
       LOADER TEXT ANIMATION
    ------------------------------ */
    const loaderText = document.getElementById("loader-text");
    const loaderString = loaderText.textContent;
    loaderText.textContent = "";

    loaderString.split("").forEach(char => {
      const span = document.createElement("span");
      span.textContent = char;
      span.classList.add("char");
      loaderText.appendChild(span);
    });

    animate("#loader-text .char", { opacity: [0,1], y: [20,0] }, { duration: 0.4, delay: stagger(0.05) });

    /* ------------------------------
       FADE OUT LOADER → FADE IN MAIN
    ------------------------------ */
    setTimeout(() => {
      const loader = document.getElementById("loader");
      const main = document.getElementById("main-content");

      loader.style.opacity = 0;

      setTimeout(() => {
        loader.remove();
        main.style.opacity = 1;

        /* ------------------------------
           MAIN CONTENT TEXT ANIMATION
        ------------------------------ */
        const mainText = document.getElementById("animated-text");
        const mainString = mainText.textContent;
        mainText.textContent = "";

        mainString.split("").forEach(char => {
          const span = document.createElement("span");
          span.textContent = char;
          span.classList.add("char-main");
          mainText.appendChild(span);
        });

        animate("#loader-text .char", { opacity: [0,1], y: [20,0] }, { duration: 0.4, delay: stagger(0.05) });

      }, 1000); // matches fade-out duration
    }, 5000);
  </script>

</body>
</html>
