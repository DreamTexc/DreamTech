<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DreamTech</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: monospace;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* TOKEN PHRASE */
    #token {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      opacity: 1;
      transition: opacity 1s ease;
      padding: 20px;
      font-size: 22px;
      line-height: 1.6;
    }

    .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(20px);
    }

    /* AI GIRL IMAGE */
    #girl {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 1s ease;
    }

    #girl img {
      width: 400px;
      opacity: 0;
      transform: translateY(20px);
    }
  </style>
</head>

<body>

  <!-- TOKEN PHRASE -->
  <div id="token">
    <div id="token-text">
      put a silver dollar on each eyelid…goodnight sleeper cell bot
    </div>
  </div>

  <!-- AI GIRL IMAGE -->
  <div id="girl">
    <img id="girl-img" src="https://raw.githubusercontent.com/DreamTexc/DreamTech/main/27.jpg">
  </div>

  <!-- Motion One -->
  <script src="https://cdn.jsdelivr.net/npm/motion@10.16.4/dist/motion.min.js"></script>

  <script>
  document.addEventListener("DOMContentLoaded", () => {

    /* SAFETY CHECK: Ensure Motion One loaded */
    if (!window.motion) {
      console.error("Motion One failed to load.");
      return;
    }

    const { animate, stagger } = motion;

    /* TOKEN PHRASE PHASER */
    const tokenText = document.getElementById("token-text");
    const chars = tokenText.textContent.split("");
    tokenText.textContent = "";

    chars.forEach(c => {
      const span = document.createElement("span");
      span.textContent = c;
      span.classList.add("char");
      tokenText.appendChild(span);
    });

    animate("#token-text .char",
      { opacity: [0,1], y: [20,0] },
      { duration: 0.4, delay: stagger(0.05) }
    );

    /* WAIT FOR IMAGE TO LOAD BEFORE STARTING TIMER */
    const girlImg = document.getElementById("girl-img");

    girlImg.onload = () => {

      // AFTER IMAGE LOADS → START 5 SECOND TIMER
      setTimeout(() => {

        // fade out token phrase
        document.getElementById("token").style.opacity = 0;

        // after fade-out, fade in girl
        setTimeout(() => {
          const girl = document.getElementById("girl");
          girl.style.opacity = 1;

          animate("#girl-img",
            { opacity: [0,1], y: [20,0] },
            { duration: 1.2 }
          );

        }, 1000);

      }, 5000);
    };

  });
  </script>

</body>
</html>
