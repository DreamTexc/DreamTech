<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DreamTech</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: monospace;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* TOKEN PHRASE */
    #token {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      opacity: 1;
      transition: opacity 1s ease;
      padding: 20px;
      font-size: 22px;
      line-height: 1.6;
    }

    .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(20px);
    }

    /* IMAGE REVEAL */
    #girl {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 1s ease;
    }

    #girl img {
      width: 400px;
      opacity: 0;
      transform: translateY(20px);
    }

    /* MAIN CONTENT */
    #main-content {
      opacity: 0;
      transition: opacity 1s ease;
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- ⭐ TOKEN PHRASE FIRST -->
  <div id="token">
    <div id="token-text">
      put a silver dollar on each eyelid… goodnight sleeper cell bot
    </div>
  </div>

  <!-- ⭐ IMAGE SECOND -->
  <div id="girl">
    <img id="girl-img" src="YOUR_IMAGE_URL_HERE">
  </div>

  <!-- ⭐ MAIN CONTENT THIRD -->
  <div id="main-content">
    <h1 id="animated-text">Motion Character Tracer</h1>
  </div>

  <!-- Motion One -->
  <script src="https://cdn.jsdelivr.net/npm/motion@10.16.4/dist/motion.min.js"></script>

  <script>
    const { animate, stagger } = motion;

    /* ------------------------------
       1. TOKEN PHRASE PHASER
    ------------------------------ */
    const tokenText = document.getElementById("token-text");
    const chars = tokenText.textContent.split("");
    tokenText.textContent = "";

    chars.forEach(c => {
      const span = document.createElement("span");
      span.textContent = c;
      span.classList.add("char");
      tokenText.appendChild(span);
    });

    animate("#token-text .char",
      { opacity: [0,1], y: [20,0] },
      { duration: 0.4, delay: stagger(0.05) }
    );

    /* ------------------------------
       2. AFTER TOKEN → FADE TOKEN OUT
    ------------------------------ */
    setTimeout(() => {
      document.getElementById("token").style.opacity = 0;

      /* ------------------------------
         3. FADE IN GIRL IMAGE
      ------------------------------ */
      setTimeout(() => {
        const girl = document.getElementById("girl");
        girl.style.opacity = 1;

        animate("#girl-img",
          { opacity: [0,1], y: [20,0] },
          { duration: 1.2 }
        );

        /* ------------------------------
           4. AFTER IMAGE → MAIN CONTENT
        ------------------------------ */
        setTimeout(() => {
          girl.style.opacity = 0;

          setTimeout(() => {
            const main = document.getElementById("main-content");
            main.style.opacity = 1;

            /* MAIN TEXT PHASER */
            const mainText = document.getElementById("animated-text");
            const letters = mainText.textContent.split("");
            mainText.textContent = "";

            letters.forEach(c => {
              const span = document.createElement("span");
              span.textContent = c;
              span.style.opacity = 0;
              span.style.display = "inline-block";
              span.style.transform = "translateY(20px)";
              mainText.appendChild(span);
            });

            animate("#animated-text span",
              { opacity: [0,1], y: [20,0] },
              { duration: 0.4, delay: stagger(0.05) }
            );

          }, 1000);

        }, 3000); // how long the girl stays visible

      }, 1000);

    }, 4000); // how long token phrase stays visible
  </script>

</body>
</html>
