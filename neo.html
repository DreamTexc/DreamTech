<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DreamTech</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: monospace;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* LOADER stays fullscreen */
    #loader {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
      opacity: 1;               /* REQUIRED */
      transition: opacity 1s ease;
    }

    #loader img {
      width: 400px;
      opacity: 0;               /* starts invisible */
      transform: translateY(20px);
    }

    /* MAIN CONTENT */
    #main-content {
      opacity: 0;
      transition: opacity 1s ease;
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- ⭐ LOADER SCREEN WITH IMAGE -->
  <div id="loader">
    <img id="loader-img" src="https://as1.ftcdn.net/v2/jpg/05/71/55/96/1000_F_571559697_IKxtD73oKlGMsD4PA0SUAPRlwFSCmLbu.jpg">
  </div>

  <!-- ⭐ MAIN CONTENT -->
  <div id="main-content">
    <h1 id="animated-text">Motion Character Tracer</h1>
  </div>

  <!-- Motion One -->
  <script src="https://cdn.jsdelivr.net/npm/motion@10.16.4/dist/motion.min.js"></script>

  <script>
    const { animate, stagger } = motion;

    /* ------------------------------
       WAIT FOR IMAGE TO LOAD
    ------------------------------ */
    const loaderImg = document.getElementById("loader-img");

    loaderImg.onload = () => {
      animate("#loader-img",
        { opacity: [0,1], y: [20,0] },
        { duration: 0.8 }
      );
    };

    /* ------------------------------
       FADE OUT LOADER → FADE IN MAIN
    ------------------------------ */
    setTimeout(() => {
      const loader = document.getElementById("loader");
      const main = document.getElementById("main-content");

      loader.style.opacity = 0;

      setTimeout(() => {
        loader.remove();
        main.style.opacity = 1;

        /* MAIN PAGE PHASER */
        const mainText = document.getElementById("animated-text");
        const chars = mainText.textContent.split("");
        mainText.textContent = "";

        chars.forEach(c => {
          const span = document.createElement("span");
          span.textContent = c;
          span.style.opacity = 0;
          span.style.display = "inline-block";
          span.style.transform = "translateY(20px)";
          mainText.appendChild(span);
        });

        animate("#animated-text span",
          { opacity: [0,1], y: [20,0] },
          { duration: 0.4, delay: stagger(0.05) }
        );

      }, 1000); // matches fade-out duration
    }, 5000);
  </script>

</body>
</html>
