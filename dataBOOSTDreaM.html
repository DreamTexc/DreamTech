<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XML to Table</title>

    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>

    <script defer>
        // -----------------------------------------
        // DreamTech @Class Wrapper Specifier System
        // -----------------------------------------
        class SelectionWrapper {
            constructor() {
                this.lastSelection = "";
            }

            update() {
                const sel = document.getSelection().toString().trim();
                if (sel && sel !== this.lastSelection) {
                    this.lastSelection = sel;
                    this.onSelection(sel);
                }
            }

            onSelection(text) {
                console.log("Wrapper received:", text);
            }
        }

        const wrapper = new SelectionWrapper();

        // -----------------------------------------
        // Unified Selection Listener
        // -----------------------------------------
        document.addEventListener("selectionchange", () => {
            const sel = document.getSelection().toString().trim();
            const out = document.getElementById("selectionOutput");
            out.textContent = sel ? `Selected: "${sel}"` : "";
            wrapper.update();
        });

        // -----------------------------------------
        // DreamTech Spawn Specifier Interpreter
        // -----------------------------------------
        function runSpecifier(cmd) {
            switch (cmd) {
                case "@spawn.polarizer":
                    generatePolarizer();
                    break;

                default:
                    console.warn("Unknown DreamTech specifier:", cmd);
            }
        }

        // -----------------------------------------
        // Spacebar → Execute Spawn Specifier
        // -----------------------------------------
        document.addEventListener("keydown", (event) => {
            if (event.code === "Space") {
                event.preventDefault();
                runSpecifier("@spawn.polarizer");
            }
        });

        // -----------------------------------------
        // Generator: Heliopan Linear Polarizer
        // -----------------------------------------
        function generatePolarizer() {
            const container = document.getElementById("tableContainer");

            const wrap = document.createElement("div");
            wrap.style.margin = "12px 0";

            const label = document.createElement("div");
            label.textContent = "Heliopan Linear Polarizer";

            const img = document.createElement("img");
            img.src = "https://th.bing.com/th/id/OIP.mTCbpFG-xUdGvY777UJUiQHaEK?w=292&h=180&c=7&r=0&o=7&dpr=1.5&pid=1.7&rm=3";
            img.alt = "Heliopan Linear Polarizer";
            img.style.width = "200px";
            img.style.display = "block";
            img.style.marginTop = "6px";

            wrap.appendChild(label);
            wrap.appendChild(img);
            container.appendChild(wrap);
        }
    </script>
</head>

<body>
    <h1>Welcome to DreamTech</h1>

    <div id="selectionOutput"></div>

    <button id="loadTable">Load Table</button>
    <button onclick="window.location.href='jetMathOverlay.html'">Generate Content</button>

    <div id="tableContainer"></div>
</body>
</html>
